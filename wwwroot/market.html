<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Market | Trade Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a class="btn btn-sm btn-outline-info rounded-pill px-3" href="index.html">← Dashboard</a>
            <h1 class="fw-bold mb-0">MARKET TERMINAL</h1>
            <div id="playerStats" class="text-end">
                <span id="playerNameDisplay" class="me-2 text-info small fw-bold"></span>
                <span id="playerBalanceDisplay" class="badge bg-success"></span>
            </div>
        </div>

        <div class="glass-card p-4">
            <table class="table table-dark align-middle mb-0">
                <thead class="text-muted small">
                    <tr>
                        <th>RESOURCE</th>
                        <th>LIVE PRICE</th>
                        <th>SUPPLY</th>
                        <th class="text-center">ACTION</th>
                    </tr>
                </thead>
                <tbody id="marketBody">
                    <!-- JS Data -->
                </tbody>
            </table>
        </div>
    </div>

<!-- Ensure script.js is linked first -->
<!-- Is line ko check karein ke path sahi hai -->
<script src="js/script.js"></script> 
<!-- Agar js folder mein nahi hai to sirf: <script src="script.js"></script> -->

<script>
    // 1. Ensure API_URL is defined (Agar script.js load nahi hui to ye fallback kaam karega)
    const BASE_API = window.location.origin + "/api";

    async function loadMarket() {
        try {
            const res = await fetch(`${BASE_API}/market`);
            const data = await res.json();
            const tbody = document.getElementById('marketBody');

            if (!tbody) return; // Guard clause

            tbody.innerHTML = data.map(item => {
    const resClass = item.Name.toLowerCase().replace(/\s/g, '');
    
    return `
    <tr class="border-bottom border-secondary border-opacity-10">
        <td class="py-4 ps-4">
            <span class="res-name ${resClass} h5 mb-0">${item.Name}</span>
        </td>
        <td class="py-4 text-success fw-bold">
            $${item.CurrentPrice.toFixed(2)}
        </td>
        <td class="py-4 text-muted">
            ${item.Supply || 0} units
        </td>
        <td class="py-4">
            <!-- Quantity Input Field -->
            <input type="number" id="qty-${item.ResourceId || item.Id}" 
                   class="form-control form-control-sm d-inline-block bg-dark text-white border-secondary" 
                   style="width: 70px;" value="1" min="1">
        </td>
        <td class="text-center py-4">
            <button class="btn btn-sm btn-primary rounded-pill px-3" 
                    onclick="quickTrade(${item.ResourceId || item.Id}, 'BUY')">BUY</button>
            <button class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-2" 
                    onclick="quickTrade(${item.ResourceId || item.Id}, 'SELL')">SELL</button>
        </td>
    </tr>`;
}).join('');
        } catch (err) {
            console.error("Market Load Error:", err);
        }
    }

    async function quickTrade(resourceId, action) {
    // Input field se user ki likhi hui quantity uthana
    const qtyInput = document.getElementById(`qty-${resourceId}`);
    const quantity = parseInt(qtyInput.value);

    if (isNaN(quantity) || quantity <= 0) {
        alert("Please enter a valid quantity!");
        return;
    }

    console.log(`Trading ${quantity} units of ${resourceId} (${action})`);
    
    const player = JSON.parse(localStorage.getItem('currentPlayer'));
    if (!player) {
        alert("Pehle Nation select karein!");
        return;
    }

    try {
        const res = await fetch(`${BASE_API}/trade`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                PlayerId: player.PlayerId || player.Id,
                ResourceId: resourceId,
                Action: action,
                Quantity: quantity // Ab yahan fixed 1 nahi, user wali quantity jayegi
            })
        });

        if (res.ok) {
            alert(`${action} Successful for ${quantity} units!`);
            if (typeof refreshPlayerData === "function") await refreshPlayerData();
            loadMarket();
        } else {
            const error = await res.json();
            alert("Error: " + (error.message || "Trade failed"));
        }
    } catch (err) {
        console.error("Trade Error:", err);
    }
}
    // Page load hote hi market load karo
    window.onload = loadMarket;
</script>
</body>
</html>
