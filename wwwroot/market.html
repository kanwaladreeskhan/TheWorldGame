<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market - Global Trade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Back to Countries</a>
            <div class="ms-auto">
                <span id="playerName" class="me-3"></span>
                <span class="balance">Balance: $<span id="balance"></span></span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">📊 Current Market</h2>
        <div class="table-responsive">
            <table class="table table-dark table-hover" id="marketTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Resource</th>
                        <th>Price ($)</th>
                        <th>Supply</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Trade Form -->
        <div class="card mt-4 p-4">
            <h4>Make a Trade</h4>
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="number" id="resourceId" class="form-control" placeholder="Resource ID">
                </div>
                <div class="col-md-3">
                    <select id="action" class="form-select">
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" id="quantity" class="form-control" placeholder="Quantity" value="1">
                </div>
                <div class="col-md-3">
                    <button onclick="executeTrade()" class="btn btn-success w-100 btn-trade">Execute Trade</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        // Market load logic (Inside market.html script)
        async function loadMarket() {
            try {
                const res = await fetch('/api/market');
                const data = await res.json();
                const tbody = document.querySelector('#marketTable tbody');

                tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.Id}</td>
                <td>${item.Name}</td>
                <td class="text-success fw-bold">$${(item.CurrentPrice || 0).toFixed(2)}</td>
                <td>${item.Supply}</td>
                <td>${item.Demand}</td>
                <td><button class="btn btn-sm btn-primary" onclick="document.getElementById('resourceId').value=${item.Id}">Select</button></td>
            </tr>
        `).join('');
            } catch (err) { console.error(err); }
        }

        // Execute Trade logic (Inside market.html script)
        async function executeTrade() {
            const saved = localStorage.getItem('currentPlayer');
            if (!saved) return alert("Please select a country from the home page first!");

            const player = JSON.parse(saved);
            console.log("Current Player from Storage:", player); // Check karein yahan PlayerId hai ya nahi

            const resId = document.getElementById('resourceId').value;
            const qty = document.getElementById('quantity').value;
            const act = document.getElementById('action').value;

            if (!resId || !qty) return alert("Please select a resource and enter quantity!");

            const payload = {
                PlayerId: parseInt(player.PlayerId), // Ensure it's a number
                ResourceId: parseInt(resId),
                Quantity: parseInt(qty),
                Action: act
            };
         
            console.log("Sending Payload to API:", payload);

            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();

                if (res.ok) {
                    alert("Success: " + result.message);
                    // Balance update karne ke liye naya data fetch karein
                    const upRes = await fetch(`/api/player/${player.Name}`);
                    const updatedPlayer = await upRes.json();
                    localStorage.setItem('currentPlayer', JSON.stringify(updatedPlayer));
                    location.reload();
                } else {
                    // SQL Errors yahan dikhengy (like Insufficient Balance)
                    alert("Trade Error: " + result.message);
                }
            } catch (err) {
                alert("System Error: Could not connect to Server.");
            }
        }

           

        // IMPORTANT: Function call
        window.onload = () => {
            updateBalanceUI();     // ← Yeh line add karo
            loadMarket();
        };
    </script>
</body>
</html>
