<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market - Global Trade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Back to Countries</a>
            <div class="ms-auto">
                <span id="playerName" class="me-3"></span>
                <span class="balance">Balance: $<span id="balance"></span></span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">📊 Current Market</h2>
        <div class="table-responsive">
            <table class="table table-dark table-hover" id="marketTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Resource</th>
                        <th>Price ($)</th>
                        <th>Supply</th>
                        <th>Demand</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Trade Form -->
        <div class="card mt-4 p-4">
            <h4>Make a Trade</h4>
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="number" id="resourceId" class="form-control" placeholder="Resource ID">
                </div>
                <div class="col-md-3">
                    <select id="action" class="form-select">
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="number" id="quantity" class="form-control" placeholder="Quantity" value="1">
                </div>
                <div class="col-md-3">
                    <button onclick="executeTrade()" class="btn btn-success w-100 btn-trade">Execute Trade</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        // ── Market Table Load ──
        async function loadMarket() {
            try {
                const res = await fetch('/api/market');
                const data = await res.json();
                const tbody = document.querySelector('#marketTable tbody');

                tbody.innerHTML = data.map(item => `
                        <tr>
                            <td>${item.Id}</td>
                            <td>${item.Name}</td>
                            <td class="text-success fw-bold">$${(item.CurrentPrice || 0).toFixed(2)}</td>
                            <td>${item.Supply}</td>
                            <td>${item.Demand}</td>
                            <td><button class="btn btn-sm btn-primary"
                                onclick="document.getElementById('resourceId').value=${item.Id}">Select</button></td>
                        </tr>
                    `).join('');
            } catch (err) {
                console.error("Market load error:", err);
            }
        }

        // ── Execute Trade ──
        async function executeTrade() {
            const saved = localStorage.getItem('currentPlayer');
            if (!saved) return alert("Please select a country from the home page first!");

            const player = JSON.parse(saved);
            const resId = document.getElementById('resourceId').value;
            const qty = document.getElementById('quantity').value;
            const act = document.getElementById('action').value;

            if (!resId || !qty) return alert("Please select a resource and enter quantity!");

            const payload = {
                PlayerId: parseInt(player.PlayerId || player.Id),
                ResourceId: parseInt(resId),
                Quantity: parseInt(qty),
                Action: act
            };

            console.log("Sending payload:", payload);

            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();

                if (res.ok) {
                    // Balance refresh — player name se updated data fetch karo
                    try {
                        const upRes = await fetch(`/api/player/${encodeURIComponent(player.Name)}`);
                        if (upRes.ok) {
                            const updatedPlayer = await upRes.json();
                            // PlayerId preserve karo
                            updatedPlayer.PlayerId = updatedPlayer.Id || updatedPlayer.PlayerId || player.PlayerId;
                            localStorage.setItem('currentPlayer', JSON.stringify(updatedPlayer));
                        }
                    } catch (e) { /* balance update fail ho to bhi trade success show karo */ }

                    alert("✅ Trade Successful!\n" + result.message);
                    location.reload();
                } else {
                    alert("❌ Trade Error: " + (result.message || "Unknown error"));
                }
            } catch (err) {
                console.error("Trade error:", err);
                alert("System Error: Could not connect to Server.");
            }
        }

        // Page load
        window.onload = () => {
            updateBalanceUI();
            loadMarket();
        };
    </script>
</body>
</html>
