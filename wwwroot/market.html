<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market | Trade Simulator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .navbar { background: #1e293b; border-bottom: 2px solid #334155; }
        .btn-primary { background: #3b82f6; border: none; transition: 0.3s; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .badge-balance { font-size: 1rem; padding: 0.5rem 1rem; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🌎 Global Trade</a>
        <div class="ms-auto d-flex align-items-center">
            <span id="playerNameDisplay" class="me-3 text-info fw-bold"></span>
            <span id="playerBalanceDisplay" class="badge bg-success badge-balance"></span>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Global Resource Market</h2>
        <button class="btn btn-outline-light btn-sm" onclick="loadMarket()">🔄 Refresh Prices</button>
    </div>

    <!-- Market Table -->
    <div class="table-responsive glass-card p-4">
        <table class="table table-dark table-hover mb-0" id="marketTable">
            <thead>
                <tr>
                    <th>Resource</th>
                    <th>Live Price</th>
                    <th>Supply</th>
                    <th>Demand</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>
            <tbody id="marketBody">
                <!-- Data loaded via JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    // Load market data from API
    async function loadMarket() {
        try {
            const res = await fetch('/api/market');
            if (!res.ok) throw new Error("Failed to fetch market data");
            
            const data = await res.json();
            const tbody = document.getElementById('marketBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No resources available.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="fw-bold text-light">${item.Name}</td>
                    <td class="text-success fw-bold">$${(item.CurrentPrice || 0).toFixed(2)}</td>
                    <td>${item.Supply} units</td>
                    <td>${item.Demand} units</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-primary px-3" onclick="quickTrade(${item.Id}, 'BUY')">Buy</button>
                        <button class="btn btn-sm btn-outline-danger ms-2 px-3" onclick="quickTrade(${item.Id}, 'SELL')">Sell</button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error("Market Load Error:", error);
            document.getElementById('marketBody').innerHTML = `<tr><td colspan="5" class="text-danger text-center">Connection Error: Server not responding.</td></tr>`;
        }
    }

    // Execute Trade Function
    async function quickTrade(resId, action) {
        const qty = prompt(`Enter quantity to ${action}:`, "1");
        if (!qty || isNaN(qty) || parseInt(qty) <= 0) return;

        const saved = localStorage.getItem('currentPlayer');
        if (!saved) return alert("Please select a country first!");
        
        const player = JSON.parse(saved);
        const payload = {
            PlayerId: parseInt(player.PlayerId || player.Id),
            ResourceId: parseInt(resId),
            Quantity: parseInt(qty),
            Action: action
        };

        try {
            const res = await fetch('/api/trade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            const result = await res.json();
            
            if (res.ok) {
                alert("✅ Trade Successful!\n" + (result.message || ""));
                // Update local balance
                refreshPlayerData(player.Name);
                loadMarket();
            } else {
                alert("❌ Trade Failed: " + result.message);
            }
        } catch (error) {
            alert("System Error: Could not connect to API.");
        }
    }

    // Refresh balance after trade
    async function refreshPlayerData(name) {
        try {
            const res = await fetch(`/api/player/${encodeURIComponent(name)}`);
            if (res.ok) {
                const updated = await res.json();
                updated.PlayerId = updated.Id || updated.PlayerId;
                localStorage.setItem('currentPlayer', JSON.stringify(updated));
                updateUI();
            }
        } catch (e) { console.error("Balance sync failed"); }
    }

    // Update Player Info UI
    function updateUI() {
        const player = JSON.parse(localStorage.getItem('currentPlayer'));
        if(player) {
            document.getElementById('playerNameDisplay').innerText = player.Name;
            document.getElementById('playerBalanceDisplay').innerText = "$" + (player.Balance || 0).toLocaleString();
        }
    }

    window.onload = () => { 
        updateUI(); 
        loadMarket(); 
    };
</script>
</body>
</html>
