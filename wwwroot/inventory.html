<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inventory | Trade Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .navbar { background: #1e293b; border-bottom: 2px solid #334155; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🌎 Global Trade</a>
        <div class="ms-auto d-flex align-items-center">
            <span id="playerNameDisplay" class="me-3 text-info fw-bold"></span>
            <span id="playerBalanceDisplay" class="badge bg-success p-2"></span>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">📦 Your Inventory</h2>
    
    <div class="table-responsive glass-card p-4">
        <table class="table table-dark table-hover mb-0" id="inventoryTable">
            <thead>
                <tr>
                    <th>Resource Name</th>
                    <th>Quantity Owned</th>
                    <th>Market Value (Total)</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <!-- Data will load here -->
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
<script>
    async function loadInventory() {
        const saved = localStorage.getItem('currentPlayer');
        if (!saved) return;
        
        const player = JSON.parse(saved);
        try {
            // Player ID ke mutabiq inventory fetch karein
            const res = await fetch(`/api/player/${player.Id || player.PlayerId}/inventory`);
            const data = await res.json();
            
            const tbody = document.getElementById('inventoryBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center">Your warehouse is empty!</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.ResourceName}</td>
                    <td>${item.Quantity} units</td>
                    <td class="text-info">$${(item.TotalValue || 0).toLocaleString()}</td>
                </tr>
            `).join('');
        } catch (error) {
            console.error("Inventory Load Error:", error);
        }
    }

    function updateUI() {
        const player = JSON.parse(localStorage.getItem('currentPlayer'));
        if(player) {
            document.getElementById('playerNameDisplay').innerText = player.Name;
            document.getElementById('playerBalanceDisplay').innerText = "$" + (player.Balance || 0).toLocaleString();
        }
    }

    window.onload = () => {
        updateUI();
        loadInventory();
    };
</script>
</body>
</html>
