<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Inventory | World Game</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific alignment for Inventory Table */
        .res-name { font-weight: bold; letter-spacing: 1px; }
        .oil { color: #ffca28; }
        .gold { color: #bdbdbd; }
        .food { color: #ffa726; }
        .steel { color: #26c6da; }
        .tech { color: #00bcd4; }
        .gas { color: #4db6ac; }
        .coal { color: #81d4fa; }
        .electronics { color: #4fc3f7; }

        .inventory-badge {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: #00d2ff;
            padding: 5px 12px;
            border-radius: 5px;
        }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <!-- Top Navigation & Stats -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <a class="btn btn-sm btn-outline-info rounded-pill px-3 mb-3" href="index.html">
                    <i class="fas fa-arrow-left me-2"></i>Dashboard
                </a>
                <h1 class="display-6 fw-bold"><i class="fas fa-box-open me-3 text-info"></i>Your Inventory</h1>
            </div>
            <div class="text-end glass-card p-3">
                <div class="small text-muted text-uppercase">Current Player</div>
                <div class="h5 mb-0 fw-bold" id="playerInfoHeader">Loading...</div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="glass-card p-4">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle mb-0" id="inventoryTable">
                            <thead>
                                <tr class="text-muted small border-bottom border-secondary">
                                    <th style="width: 40%; padding-left: 20px;">RESOURCE NAME</th>
                                    <th style="width: 30%;">QUANTITY OWNED</th>
                                    <th class="text-end" style="width: 30%; padding-right: 20px;">MARKET VALUE (TOTAL)</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody">
                                <!-- JS Data will inject here -->
                                <tr>
                                    <td colspan="3" class="text-center py-5">
                                        <div class="spinner-border text-info" role="status"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
async function loadInventory() {
    try {
        // 1. LocalStorage se player info lena
        const player = JSON.parse(localStorage.getItem('currentPlayer')) || { Id: 1, Name: "Player1" };
        document.getElementById('playerInfoHeader').innerText = `${player.Name}`;

        // 2. Market Prices aur Player Inventory dono ko fetch karna
        // Hum Promise.all use kar rahe hain taake dono calls jaldi ho jayein
        const [marketRes, invRes] = await Promise.all([
            fetch('/api/market'),
            fetch(`/api/player/${player.Id}/inventory`)
        ]);

        const marketPrices = await marketRes.json();
        const inventoryData = await invRes.json();
        const tbody = document.getElementById('inventoryBody');

        if (!inventoryData || inventoryData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5 text-muted italic">Warehouse is empty. Start trading!</td></tr>';
            return;
        }

        // 3. Data ko map karna aur Value calculate karna
        tbody.innerHTML = inventoryData.map(item => {
            // Market data mein se is resource ki live price dhoondna
            // Ensure karein ke aapki API mein 'ResourceId' ya 'Id' match kar raha ho
            const marketItem = marketPrices.find(m => m.Id === item.ResourceId || m.Name === item.ResourceName);
            const livePrice = marketItem ? marketItem.CurrentPrice : 0;
            
            // Quantity * Live Price = Actual Market Value
            const totalValue = item.Quantity * livePrice;

            // Resource class for colors (e.g., 'oil', 'gold')
            const resClass = item.ResourceName.toLowerCase().replace(/\s/g, '');
            
            return `
                <tr class="border-bottom border-secondary border-opacity-10">
                    <td class="py-4 ps-4">
                        <span class="res-name ${resClass} h5 mb-0">${item.ResourceName}</span>
                    </td>
                    <td class="py-4">
                        <span class="inventory-badge fw-bold">${item.Quantity} units</span>
                    </td>
                    <td class="text-end py-4 pe-4 wealth-text">
                        $${Math.floor(totalValue).toLocaleString()}
                    </td>
                </tr>
            `;
        }).join('');

    } catch (err) {
        console.error("Inventory Error:", err);
        document.getElementById('inventoryBody').innerHTML = '<tr><td colspan="3" class="text-center text-danger py-5">Failed to sync with warehouse.</td></tr>';
    }
}

window.onload = loadInventory;
    </script>
</body>
</html>
