<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inventory | Global Trade Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .navbar { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .resource-badge { background: #334155; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container">
            <a class="btn btn-outline-light btn-sm" href="index.html"><i class="fas fa-arrow-left me-2"></i> Back</a>
            <span class="navbar-brand mx-auto fw-bold">🎒 National Inventory</span>
            <div class="text-end">
                <span id="playerName" class="me-3 text-info fw-bold"></span>
                <span class="fw-bold text-success">$<span id="balance">0</span></span>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h2>Asset Overview</h2>
                <p class="text-muted">Current stockpile and resource valuation.</p>
            </div>
            <div class="col-md-6 text-end">
                <button onclick="location.href='market.html'" class="btn btn-primary">Go to Market <i class="fas fa-shopping-cart ms-2"></i></button>
            </div>
        </div>

        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0" id="inventoryTable">
                    <thead>
                        <tr class="text-muted">
                            <th>RESOURCE NAME</th>
                            <th class="text-center">QUANTITY</th>
                            <th class="text-center">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="noItems" class="text-center py-5 d-none">
                <i class="fas fa-box-open fa-3x mb-3 text-muted"></i>
                <h4 class="text-muted">Your warehouses are empty!</h4>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
     async function loadInventory() {
    console.log("Loading inventory..."); // Check if function starts
    const id = 1; // Testing ke liye direct 1 rakhein

    try {
        const res = await fetch(`/api/player/${id}/inventory`);
        console.log("Response status:", res.status); // Check if API is found
        
        const items = await res.json();
        console.log("Data received:", items); // Check if data is coming from SQL

        const tbody = document.getElementById('inventoryBody');
        if (items.length === 0) {
            tbody.innerHTML = "<tr><td colspan='3'>No data found in SQL</td></tr>";
            return;
        }

        tbody.innerHTML = items.map(item => `
            <tr>
              <td>${item.resourceName || item.ResourceName}</td>
              <td>${item.quantity || item.Quantity}</td>
              <td><button class="btn btn-sm btn-warning">Sell</button></td>
            </tr>
        `).join('');
    } catch (err) {
        console.error("Fetch error:", err);
    }
}
    </script>
</body>
</html>
