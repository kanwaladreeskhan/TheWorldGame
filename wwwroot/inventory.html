<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inventory - Global Trade Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Back to Countries</a>
            <a class="navbar-brand mx-auto" href="market.html">Market</a>
            <div class="ms-auto text-end">
                <span id="playerName" class="me-3 fw-bold"></span>
                <span class="balance">Balance: $<span id="balance"></span></span>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">🎒 My Inventory</h2>

        <div class="card">
            <div class="card-body">
                <table class="table table-dark table-hover" id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Resource</th>
                            <th class="text-end">Quantity</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="noItems" class="text-center text-muted mt-5 d-none">
            <h4>Your inventory is empty</h4>
            <p>Go to Market and buy some resources!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        async function loadInventory() {
            const saved = localStorage.getItem('currentPlayer');
            if (!saved) return;
            const player = JSON.parse(saved);

            try {
                // PlayerId capital P ke saath check karein
                const res = await fetch(`/api/player/${player.PlayerId}/inventory`);
                const items = await res.json();
                const tbody = document.querySelector('#inventoryTable tbody');

                if (items.length === 0) {
                    document.getElementById('noItems').classList.remove('d-none');
                    return;
                }

                tbody.innerHTML = items.map(item => `
            <tr>
                <td>${item.ResourceName}</td>
                <td class="text-end fw-bold">${item.Quantity}</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-warning" onclick="sell(${item.ResourceId})">Sell</button>
                </td>
            </tr>
        `).join('');
            } catch (err) { console.error(err); }
        }
        
        window.onload = loadInventory;

        function sellFromInventory(resourceId, maxQuantity) {
            const qty = prompt(`How many ${resourceId} do you want to sell? (Max: ${maxQuantity})`, "1");
            if (qty && parseInt(qty) > 0) {
                // Call trade API with SELL action
                executeTradeAPI(resourceId, parseInt(qty), "SELL");
            }
        }

        async function executeTradeAPI(resourceId, quantity, action) {
            const player = getCurrentPlayer();
            try {
                const res = await fetch('  /api', { 
                     
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playerId: player.id,
                        resourceId: resourceId,
                        quantity: quantity,
                        action: action
                    })
                });

                const result = await res.json();
                alert(result.message);
                loadInventory();        // Refresh inventory
                updateBalance();        // Refresh balance
            } catch (err) {
                alert("Trade failed!");
            }
        }

        window.onload = () => {
            updateBalanceUI();
            loadInventory();
        };
    </script>
</body>
</html>
