<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Trade Simulator | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: #38bdf8; }
        .nav-btn { transition: all 0.3s; border: none; padding: 20px; border-radius: 12px; text-align: left; }
        .nav-btn:hover { transform: translateY(-5px); filter: brightness(1.2); }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <!-- Selection Screen -->
        <div id="playerSelectSection" class="text-center py-5">
            <h1 class="display-4 mb-4 fw-bold">🌍 Global Trade Simulator</h1>
            <p class="text-muted mb-5">Select your country to begin the simulation</p>
            <div id="playerSelect" class="row g-3 justify-content-center"></div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="mb-0">Welcome, <span id="playerName" class="text-info"></span></h1>
                    <p class="text-muted">Strategy Lead | Global Market</p>
                </div>
                <div class="text-end">
                   <button class="btn btn-warning" onclick="handleNextTurn()">Next Turn</button>
                    <button onclick="logout()" class="btn btn-outline-danger ms-2">Exit</button>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="glass-card p-4">
                        <p class="text-muted mb-1">Available Balance</p>
                        <div class="stat-val">$<span id="balance">0</span></div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="glass-card p-4 d-flex align-items-center justify-content-around">
                        <div class="text-center">
                            <p class="text-muted mb-1">Status</p>
                            <span class="badge bg-success">Online</span>
                        </div>
                        <div class="text-center border-start ps-4">
                            <p class="text-muted mb-1">Market Volatility</p>
                            <span class="text-warning fw-bold">Medium</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Grid -->
            <div class="row g-4">
                <div class="col-md-4">
                    <button onclick="showMarket()" class="nav-btn btn btn-primary w-100 shadow">
                        <i class="fas fa-chart-line fa-2x mb-3"></i>
                        <h3>Market & Trade</h3>
                        <p class="small mb-0">Buy/Sell resources at live prices</p>
                    </button>
                </div>
                <div class="col-md-4">
                    <button onclick="showInventory()" class="nav-btn btn btn-success w-100 shadow">
                        <i class="fas fa-boxes fa-2x mb-3"></i>
                        <h3>My Inventory</h3>
                        <p class="small mb-0">Manage your country's resources</p>
                    </button>
                </div>
                <div class="col-md-4">
                    <button onclick="showLeaderboard()" class="nav-btn btn btn-warning w-100 shadow">
                        <i class="fas fa-trophy fa-2x mb-3"></i>
                        <h3>Global Ranking</h3>
                        <p class="small mb-0">Compare wealth with other nations</p>
                    </button>
                </div>
            </div>
        </div>
    </div>

  <script src="script.js">async function handleNextTurn() {
    try {
        const res = await fetch('/api/market/next-turn', { method: 'POST' });
        if (res.ok) {
            alert("Next turn started! Prices have shifted.");
            location.reload(); // Page reload karein taake naya data/prices nazar ayein
        } else {
            alert("Error updating turn.");
        }
    } catch (error) {
        console.error("Turn Error:", error);
    }
}</script>
</body>
</html>
