<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Game | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
    :root {
        --neon-blue: #00d2ff;
        --neon-green: #39ff14;
        --bg-dark: #05070a;
    }

    body {
        background: var(--bg-dark) !important;
        /* Gaming Grid Background */
        background-image: 
            linear-gradient(rgba(0, 210, 255, 0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 210, 255, 0.07) 1px, transparent 1px) !important;
        background-size: 40px 40px !important;
        color: #f1f5f9 !important;
        font-family: 'Segoe UI', sans-serif !important;
        min-height: 100vh;
    }

    /* Navbar Neon Glow */
    .navbar {
        background: rgba(5, 7, 10, 0.95) !important;
        border-bottom: 2px solid var(--neon-blue) !important;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.4) !important;
    }

    /* Glass Cards */
    .glass-card, .card {
        background: rgba(15, 23, 42, 0.8) !important;
        backdrop-filter: blur(15px) !important;
        border: 1px solid rgba(0, 210, 255, 0.3) !important;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.5) !important;
        border-radius: 15px !important;
        transition: 0.3s !important;
    }

    .card:hover {
        border-color: var(--neon-blue) !important;
        transform: translateY(-5px) !important;
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.2) !important;
    }

    /* Neon Money/Balance */
    .balance, #balance {
        color: var(--neon-green) !important;
        text-shadow: 0 0 12px rgba(57, 255, 20, 0.5) !important;
        font-weight: 800 !important;
    }

    /* Leaderboard / Ranking Specific */
    .current-player-row {
        background: rgba(0, 210, 255, 0.15) !important;
        border-left: 4px solid var(--neon-blue) !important;
    }

    .rank-1 { color: #ffd700 !important; text-shadow: 0 0 10px #ffd700; }

    /* Buttons with "Clip" look */
    .nav-btn {
        background: rgba(0, 210, 255, 0.1) !important;
        border: 1px solid var(--neon-blue) !important;
        color: white !important;
        clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        transition: 0.3s !important;
    }

    .nav-btn:hover {
        background: var(--neon-blue) !important;
        color: black !important;
        box-shadow: 0 0 15px var(--neon-blue) !important;
    }
</style>
</head>
<body class="p-4">
    <div class="container">
        <!-- Selection Screen -->
        <div id="playerSelectSection" class="text-center py-5">
            <h1 class="display-4 mb-4 fw-bold">🌍 The World Game</h1>
            <p class="text-muted mb-5"><b>Select your country to begin the simulation</b></p>
            <div id="playerSelect" class="row g-3 justify-content-center"></div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="mb-0">Welcome, <span id="playerName" class="text-info"></span></h1>
                    <p class="text-muted"><b>Strategy Lead | Global Market</b></p>
                </div>
                <div class="text-end">
                   <button class="btn btn-warning fw-bold" onclick="processNextTurn()">
    <i class="fas fa-forward me-2"></i> Next Turn
</button>
                    <button onclick="logout()" class="btn btn-outline-danger ms-2">Exit</button>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="glass-card p-4">
                        <p class="text-muted mb-1">Available Balance</p>
                        <div class="stat-val">$<span id="balance">0</span></div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="glass-card p-4 d-flex align-items-center justify-content-around">
                        <div class="text-center">
                            <p class="text-muted mb-1">Status</p>
                            <span class="badge bg-success">Online</span>
                        </div>
                        <div class="text-center border-start ps-4">
                            <p class="text-muted mb-1">Market Volatility</p>
                            <span class="text-warning fw-bold">Medium</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Grid -->
            <div class="row g-4">
                <div class="col-md-4">
                    <button onclick="showMarket()" class="nav-btn btn btn-primary w-100 shadow">
                        <i class="fas fa-chart-line fa-2x mb-3"></i>
                        <h3>Market & Trade</h3>
                        <p class="small mb-0">Buy/Sell resources at live prices</p>
                    </button>
                </div>
                <div class="col-md-4">
                    <button onclick="showInventory()" class="nav-btn btn btn-success w-100 shadow">
                        <i class="fas fa-boxes fa-2x mb-3"></i>
                        <h3>My Inventory</h3>
                        <p class="small mb-0">Manage your country's resources</p>
                    </button>
                </div>
                <div class="col-md-4">
                    <button onclick="showLeaderboard()" class="nav-btn btn btn-warning w-100 shadow">
                        <i class="fas fa-trophy fa-2x mb-3"></i>
                        <h3>Global Ranking</h3>
                        <p class="small mb-0">Compare wealth with other nations</p>
                    </button>
                </div>
            </div>
        </div>
    </div>

  <script src="script.js">async function handleNextTurn() {
    try {
        const res = await fetch('/api/market/next-turn', { method: 'POST' });
        if (res.ok) {
            alert("Next turn started! Prices have shifted.");
            location.reload(); // Page reload karein taake naya data/prices nazar ayein
        } else {
            alert("Error updating turn.");
        }
    } catch (error) {
        console.error("Turn Error:", error);
    }
}</script>
</body>
</html>
