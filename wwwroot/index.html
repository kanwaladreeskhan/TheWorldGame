<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Trade Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { background: #0f172a; color: white; } .card { background: #1e2937; } </style>
</head>
<body class="p-4">
    <div class="container">
        <h1 class="text-center mb-4">🌍 Global Trade Simulator</h1>

        <div id="playerSelect" class="row"></div>

        <div id="dashboard" class="d-none">
            <div class="d-flex justify-content-between mb-4">
                <h3 id="playerName"></h3>
                <h4>Balance: $<span id="balance"></span></h4>
            </div>

            <div class="row g-3">
                <div class="col-md-3"><button onclick="showMarket()" class="btn btn-primary w-100">📊 View Market & Trade</button></div>
                <div class="col-md-3"><button onclick="showInventory()" class="btn btn-success w-100">🎒 My Inventory</button></div>
                <div class="col-md-3"><button onclick="showLeaderboard()" class="btn btn-warning w-100">🏆 Leaderboard</button></div>
                <div class="col-md-3"><button onclick="logout()" class="btn btn-danger w-100">Exit</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <div id="dashboard" class="d-none">
        <!-- ... purana code ... -->
        <button onclick="logout()" class="btn btn-danger">Change Country / Logout</button>
    </div>
</body>
</html>
