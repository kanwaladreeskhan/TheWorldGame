<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard | Ranking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .rank-1 { color: #ffd700; font-size: 1.5rem; } /* Gold */
        .rank-2 { color: #c0c0c0; font-size: 1.3rem; } /* Silver */
        .rank-3 { color: #cd7f32; font-size: 1.1rem; } /* Bronze */
        .wealth-text { font-family: 'Courier New', Courier, monospace; color: #22c55e; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <div class="text-center mb-5">
            <a class="btn btn-sm btn-outline-secondary float-start" href="index.html">← Dashboard</a>
            <h1 class="display-5 fw-bold"><i class="fas fa-trophy text-warning me-3"></i>Global Power Ranking</h1>
            <p class="text-muted">Rankings based on total national wealth (Balance + Resource Value)</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="glass-card p-4">
                    <table class="table table-dark table-borderless align-middle" id="leaderboardTable">
                        <thead>
                            <tr class="border-bottom border-secondary text-muted">
                                <th style="width: 15%">RANK</th>
                                <th style="width: 55%">NATION</th>
                                <th class="text-end" style="width: 30%">TOTAL WEALTH</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <!-- JS injections here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/player/leaderboard');
                const data = await res.json();
                const tbody = document.getElementById('leaderboardBody');

                tbody.innerHTML = data.map((p, index) => {
                    const rank = index + 1;
                    let rankIcon = rank;
                    if(rank === 1) rankIcon = '<i class="fas fa-crown rank-1"></i>';
                    else if(rank === 2) rankIcon = '<i class="fas fa-medal rank-2"></i>';
                    else if(rank === 3) rankIcon = '<i class="fas fa-medal rank-3"></i>';

                    return `
                        <tr class="${p.IsPlayer ? 'bg-primary bg-opacity-10 border-start border-primary border-4' : ''}">
                            <td class="py-4 ps-3 fw-bold">${rankIcon}</td>
                            <td class="py-4">
                                <span class="h5 mb-0">${p.Name || p.name}</span>
                                ${p.IsPlayer ? '<span class="badge bg-primary ms-2">YOU</span>' : '<span class="badge bg-secondary ms-2 text-dark">AI</span>'}
                            </td>
                            <td class="text-end py-4 wealth-text">
                                $${(p.TotalWealth || p.totalWealth || 0).toLocaleString()}
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) { console.error("Leaderboard error:", err); }
        }

        window.onload = loadLeaderboard;
    </script>
</body>
</html>
