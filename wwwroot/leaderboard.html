<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Rankings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4">
    <div class="container">
        <div class="text-center mb-5">
            <a class="btn btn-sm btn-outline-info float-start rounded-pill px-3" href="index.html">← Dashboard</a>
            <h1 class="fw-bold text-uppercase">GLOBAL POWER RANKING</h1>
            <p class="text-muted small">FINANCIAL SUPREMACY INDEX</p>
        </div>

        <div class="glass-card p-4">
            <table class="table table-dark align-middle mb-0">
                <thead class="text-muted small">
                    <tr>
                        <th style="width: 15%">RANK</th>
                        <th style="width: 55%">NATION</th>
                        <th class="text-end" style="width: 30%">TOTAL WEALTH</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- JS Injections -->
                </tbody>
            </table>
        </div>
    </div>

        <script>
            async function loadLeaderboard() {
                const res = await fetch('/api/player/leaderboard');
                const data = await res.json();
                const tbody = document.getElementById('leaderboardBody');

                tbody.innerHTML = data.map((p, index) => {
                    const rank = index + 1;
                    let rankDisplay = "";

                    // Fix: Yahan humne har rank ko handle kiya hai
                    if(rank === 1) rankDisplay = `<i class="fas fa-crown text-warning"></i> <span class="text-warning">1</span>`;
                    else if(rank === 2) rankDisplay = `<i class="fas fa-medal text-secondary"></i> <span class="text-secondary">2</span>`;
                    else if(rank === 3) rankDisplay = `<i class="fas fa-medal" style="color: #cd7f32;"></i> <span style="color: #cd7f32;">3</span>`;
                    else rankDisplay = `<span class="ms-2 text-muted">${rank}</span>`;

                    return `
                        <tr class="${p.IsPlayer ? 'player-highlight' : ''}">
                            <td class="py-4 ps-3 fw-bold">${rankDisplay}</td>
                            <td class="py-4">
                                <span class="h5 mb-0 fw-bold">${p.Name || p.name}</span>
                                <span class="badge ${p.IsPlayer ? 'badge-you' : 'badge-ai'} ms-3">
                                    ${p.IsPlayer ? 'YOU' : 'AI UNIT'}
                                </span>
                            </td>
                            <td class="text-end py-4 text-success fw-bold fs-5">
                                $${Math.floor(p.TotalWealth || p.totalWealth || 0).toLocaleString()}
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            window.onload = loadLeaderboard;
        </script>
</body>
</html>
