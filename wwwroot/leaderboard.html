<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Global Trade Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Back to Countries</a>
            <a class="navbar-brand mx-auto" href="market.html">Market</a>
            <div class="ms-auto text-end">
                <span id="playerName" class="me-3 fw-bold"></span>
                 
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">🏆 Global Leaderboard</h2>

        <div class="card">
            <div class="card-body">
                <table class="table table-dark table-hover" id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Country</th>
                            <th class="text-end">Total Wealth ($)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/player/leaderboard');
                const data = await res.json();

                // 🔥 ADD THIS LINE (DEBUG)
                console.log("Leaderboard API:", data);

                const tbody = document.querySelector('#leaderboardTable tbody');

                tbody.innerHTML = data.map((p, index) => `
    <tr>
        <td>#${index + 1}</td>
        <td>${p.name || p.Name}</td>
        <td class="text-end fw-bold">$${(p.totalWealth || p.TotalWealth || 0).toLocaleString()}</td>
    </tr>
`).join('');
            } catch (err) { console.error(err); }
        }
        window.onload = loadLeaderboard;
    </script>
</body>
</html>
